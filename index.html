<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
    <title>TriviAll</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Nunito', sans-serif;
        background: #1A1A2E;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Debug: capture URL before React loads (remove after fixing OAuth)
      if (window.location.pathname === '/auth' && (window.location.search || window.location.hash)) {
        document.title = 'AUTH CALLBACK: ' + window.location.search + ' ' + window.location.hash;
        sessionStorage.setItem('oauth_debug', window.location.href);
      }
      // Also show if we previously captured a callback URL
      var prev = sessionStorage.getItem('oauth_debug');
      if (prev) {
        console.error('[OAuth Debug] Previous callback URL:', prev);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
