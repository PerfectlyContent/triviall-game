<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#16213E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38B2AC"/>
      <stop offset="100%" style="stop-color:#4FD1C5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Decorative dots -->
  <circle cx="80" cy="80" r="12" fill="#38B2AC" opacity="0.3"/>
  <circle cx="432" cy="80" r="8" fill="#F56565" opacity="0.3"/>
  <circle cx="80" cy="432" r="8" fill="#ECC94B" opacity="0.3"/>
  <circle cx="432" cy="432" r="12" fill="#9F7AEA" opacity="0.3"/>
  <!-- Question mark circle -->
  <circle cx="256" cy="230" r="120" fill="none" stroke="url(#accent)" stroke-width="8" opacity="0.3"/>
  <circle cx="256" cy="230" r="90" fill="url(#accent)" opacity="0.15"/>
  <!-- Question mark -->
  <text x="256" y="270" font-family="Poppins, Arial, sans-serif" font-size="160" font-weight="900" fill="url(#accent)" text-anchor="middle" dominant-baseline="middle">?</text>
  <!-- TriviAll text -->
  <text x="256" y="420" font-family="Poppins, Arial, sans-serif" font-size="64" font-weight="900" fill="white" text-anchor="middle" letter-spacing="2">
    <tspan fill="#38B2AC">Trivi</tspan><tspan fill="#F56565">All</tspan>
  </text>
</svg>
